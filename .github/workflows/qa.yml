name: QA — Migration & Template Checks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-migrations:
    name: DB Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gangsofpalestine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -e ".[dev]"

      - name: Debug app import
        run: |
          python -c "
          import sys, traceback
          sys.path.insert(0, '.')
          try:
              from config import Config
              from factory import create_app
              app = create_app(Config)
              print('APP CREATED OK')
          except Exception:
              traceback.print_exc()
              exit(1)
          " 2>&1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gangsofpalestine_test
          SECRET_KEY: ci-secret
          PG_CONNECT_TIMEOUT: 15

      - name: Run DB upgrade
        run: python scripts/qa/run_db_upgrade.py
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gangsofpalestine_test
          SECRET_KEY: ci-secret
          PG_CONNECT_TIMEOUT: 15

      - name: Verify migration state
        run: python scripts/qa/check_db_migrations.py
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gangsofpalestine_test
          SECRET_KEY: ci-secret
          PG_CONNECT_TIMEOUT: 15

  orphan-templates:
    name: Orphan Template Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -e ".[dev]"

      - name: Debug app import (sqlite)
        run: |
          python -c "
          import sys, traceback
          sys.path.insert(0, '.')
          try:
              from config import Config
              from factory import create_app
              app = create_app(Config)
              print('APP CREATED OK')
          except Exception:
              traceback.print_exc()
              exit(1)
          " 2>&1
        env:
          DATABASE_URL: sqlite:///qa-check.db
          SECRET_KEY: ci-secret

      - name: Create DB tables
        run: |
          python -c "
          import os
          os.environ['DATABASE_URL'] = 'sqlite:///qa-check.db'
          os.environ['SECRET_KEY'] = 'ci-secret'
          from factory import create_app
          from extensions import db
          app = create_app()
          with app.app_context():
              db.create_all()
              print(f'Created {len(db.metadata.tables)} tables')
          " 2>&1

      - name: Check templates
        run: |
          python scripts/check_integration.py 2>&1
        env:
          DATABASE_URL: sqlite:///qa-check.db
          SECRET_KEY: ci-secret
