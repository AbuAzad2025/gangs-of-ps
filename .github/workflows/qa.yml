name: QA — Migration & Template Checks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-migrations:
    name: DB Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gangsofpalestine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -e ".[dev]"

      - name: Debug app import
        run: |
          python -c "
import sys, traceback
sys.path.insert(0, '.')
try:
    from config import Config
    from factory import create_app
    app = create_app(Config)
    print('APP CREATED OK')
except Exception:
    traceback.print_exc()
    exit(1)
" 2>&1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gangsofpalestine_test
          SECRET_KEY: ci-secret

      - name: Check migrations
        run: |
          flask db upgrade 2>&1
          echo "--- Migration check complete ---"
          flask db current
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gangsofpalestine_test
          SECRET_KEY: ci-secret
          FLASK_APP: wsgi.py

  orphan-templates:
    name: Orphan Template Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -e ".[dev]"

      - name: Debug app import (sqlite)
        run: |
          python -c "
import sys, traceback
sys.path.insert(0, '.')
try:
    from config import Config
    from factory import create_app
    app = create_app(Config)
    print('APP CREATED OK')
except Exception:
    traceback.print_exc()
    exit(1)
" 2>&1
        env:
          DATABASE_URL: sqlite:///qa-check.db
          SECRET_KEY: ci-secret

      - name: Check templates
        run: |
          python scripts/check_integration.py 2>&1
        env:
          DATABASE_URL: sqlite:///qa-check.db
          SECRET_KEY: ci-secret
