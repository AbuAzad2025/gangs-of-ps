name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & file limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Flake8
        run: flake8 . --count --statistics

  test:
    name: Tests, PostgreSQL & coverage
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gop_test
          POSTGRES_PASSWORD: gop_test
          POSTGRES_DB: gangsofpalestine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gop_test -d gangsofpalestine_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://gop_test:gop_test@localhost:5432/gangsofpalestine_test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Pytest with PostgreSQL
        env:
          FLASK_ENV: testing
        run: |
          pytest -v \
            --cov \
            --cov-fail-under=70 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: coverage.xml
          retention-days: 14

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: pip-audit
        run: pip-audit --strict -r requirements.txt
