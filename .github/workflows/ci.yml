name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & file limits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Flake8
        run: flake8 . --count --statistics --max-line-length=200 --exclude=.venv,venv,__pycache__,migrations,scripts,static,data,.github,tests --per-file-ignores='run.py:E402'

  test:
    name: Tests, PostgreSQL & coverage
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RUN_WITH_REAL_DB: "true"
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      PG_CONNECT_TIMEOUT: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import os, sys, time
          import psycopg2
          url = os.environ["DATABASE_URL"]
          for attempt in range(30):
              try:
                  psycopg2.connect(url)
                  print("PostgreSQL is ready")
                  sys.exit(0)
              except Exception as exc:
                  print(f"waiting for postgres ({attempt + 1}/30): {exc}")
                  time.sleep(2)
          sys.exit("PostgreSQL did not become ready in time")
          PY

      - name: Pytest with live PostgreSQL
        env:
          FLASK_ENV: testing
          RUN_WITH_REAL_DB: "true"
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          pytest -v \
            --tb=long \
            --cov \
            --cov-fail-under=0 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: coverage.xml
          retention-days: 14

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install production deps + pip-audit
        run: |
          pip install .
          pip install pip-audit>=2.7.0

      - name: pip-audit
        run: pip-audit --strict
