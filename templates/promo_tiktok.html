<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gangs of Palestine - TikTok Promo</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100svh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }

        .promo-container {
            width: min(100vw, 56.25vh);
            height: min(100svh, calc(100vw * 16 / 9));
            aspect-ratio: 9 / 16;
            position: relative;
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.18);
            border-radius: 18px;
        }

        .replay-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 215, 0, 0.35);
            color: #ffd700;
            padding: 10px 12px;
            border-radius: 999px;
            font-family: inherit;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            backdrop-filter: blur(6px);
        }

        .replay-btn:hover {
            border-color: rgba(255, 215, 0, 0.65);
            background: rgba(0, 0, 0, 0.72);
        }

        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            text-align: center;
            padding: clamp(16px, 3.2vh, 28px);
            box-sizing: border-box;
            pointer-events: none; /* Let clicks pass through if needed */
            gap: clamp(10px, 1.8vh, 18px);
        }

        /* --- Animations --- */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9); }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulseGold {
            0% { text-shadow: 0 0 10px #ffd700; }
            50% { text-shadow: 0 0 30px #ffd700, 0 0 10px #fff; }
            100% { text-shadow: 0 0 10px #ffd700; }
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes fadeInStay {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Scene 1: The Hook --- */
        .scene-1 { animation: fadeInOut 4s forwards; animation-delay: 0.5s; }
        .hook-text {
            font-size: clamp(2.1rem, 4.8vh, 3.2rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
            margin-bottom: clamp(10px, 2vh, 18px);
        }
        .highlight-red { color: #dc3545; text-shadow: 0 0 20px #dc3545; }
        .hook-icon { color: #666; margin-top: clamp(8px, 2vh, 16px); }

        /* --- Scene 2: Gameplay Features --- */
        .scene-2 { animation: fadeInOut 4s forwards; animation-delay: 4.5s; }
        .scene-title {
            font-size: clamp(1.4rem, 3.2vh, 2.2rem);
            margin: 0;
            color: #fff;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(10px, 2vh, 18px);
            width: 100%;
        }
        .feature-item {
            background: rgba(255, 255, 255, 0.1);
            padding: clamp(12px, 2.2vh, 18px);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.8);
            animation: slideUp 0.5s ease-out forwards;
        }
        .feature-item i { font-size: clamp(1.8rem, 3.6vh, 2.6rem); color: #ffd700; margin-bottom: 8px; }
        .feature-item h3 { margin: 0; font-size: clamp(1rem, 2.2vh, 1.3rem); }
        
        /* --- Scene 3: Map/Context --- */
        .scene-3 { animation: fadeInOut 4s forwards; animation-delay: 8.5s; }
        .map-text { font-size: clamp(1.7rem, 4vh, 2.6rem); font-weight: 900; margin: 0; }
        .city-name {
            font-size: clamp(2.2rem, 6vh, 3.8rem);
            font-weight: 900;
            display: block;
            margin: 0;
            text-transform: uppercase;
            animation: glitch 0.75s infinite;
            line-height: 1.05;
        }
        .palestine-flag { font-size: clamp(3.2rem, 8vh, 5rem); margin-top: clamp(6px, 1.4vh, 16px); filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.5)); }

        /* --- Scene 4: CTA --- */
        .scene-4 { animation: fadeInStay 0.9s forwards; animation-delay: 12.5s; }
        .logo-large {
            font-size: clamp(3.4rem, 8vh, 5.2rem);
            color: #ffd700;
            margin-bottom: 0;
            animation: floating 3s ease-in-out infinite;
        }
        .app-title {
            font-size: clamp(1.8rem, 4.2vh, 2.8rem);
            margin: 0;
        }
        .app-subtitle {
            color: #ccc;
            font-size: clamp(1rem, 2.4vh, 1.35rem);
            margin: 0;
        }
        .cta-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            padding: clamp(12px, 2.2vh, 16px) clamp(18px, 4.2vh, 44px);
            font-size: clamp(1.15rem, 2.8vh, 1.6rem);
            font-weight: bold;
            border-radius: 50px;
            border: none;
            margin-top: clamp(10px, 2.6vh, 22px);
            box-shadow: 0 0 30px #ffd700;
            animation: pulseGold 2s infinite;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .link-bio { margin-top: clamp(10px, 2.2vh, 18px); font-size: clamp(0.95rem, 2.2vh, 1.2rem); color: #aaa; }
        .bio-domain { display: block; font-size: 0.9rem; color: #ffd700; margin-bottom: 6px; font-family: monospace; }

        /* Background Effects */
        .bg-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: radial-gradient(circle, rgba(255,215,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.5;
        }
        
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #ffd700;
            width: 0%;
            animation: progress 18s linear forwards;
        }
        @keyframes progress { to { width: 100%; } }

        @media (max-width: 420px), (max-height: 740px) {
            .feature-grid { grid-template-columns: 1fr; }
        }

    </style>
</head>
<body>

    <div class="promo-container">
        <button class="replay-btn" onclick="location.reload()">
            <i class="fas fa-redo"></i> إعادة العرض
        </button>
        <div class="bg-particles"></div>
        
        <!-- Scene 1: Hook -->
        <div class="scene scene-1">
            <div class="hook-text">
                جربت تعيش<br>
                حياة <span class="highlight-red">العصابات</span><br>
                في فلسطين؟ 🇵🇸
            </div>
            <i class="fas fa-mask fa-4x hook-icon"></i>
        </div>

        <!-- Scene 2: Features -->
        <div class="scene scene-2">
            <h2 class="scene-title">ابنِ امبراطوريتك</h2>
            <div class="feature-grid">
                <div class="feature-item" style="animation-delay: 4.6s">
                    <i class="fas fa-users"></i>
                    <h3>كوّن عصابة</h3>
                </div>
                <div class="feature-item" style="animation-delay: 4.8s">
                    <i class="fas fa-sack-dollar"></i>
                    <h3>اجمع الثروة</h3>
                </div>
                <div class="feature-item" style="animation-delay: 5.0s">
                    <i class="fas fa-skull"></i>
                    <h3>حروب شوارع</h3>
                </div>
                <div class="feature-item" style="animation-delay: 5.2s">
                    <i class="fas fa-car"></i>
                    <h3>سرقة سيارات</h3>
                </div>
            </div>
        </div>

        <!-- Scene 3: Cities -->
        <div class="scene scene-3">
            <div class="map-text">سيطر على المدن</div>
            <span class="city-name" style="color: #00ff00;">القدس</span>
            <span class="city-name" style="color: #ffffff;">غزة</span>
            <span class="city-name" style="color: #ff0000;">نابلس</span>
            <div class="palestine-flag">🇵🇸</div>
        </div>

        <!-- Scene 4: CTA -->
        <div class="scene scene-4" style="animation-fill-mode: forwards;">
            <i class="fas fa-crown logo-large"></i>
            <h1 class="app-title">عصابات فلسطين</h1>
            <p class="app-subtitle">اللعبة الاستراتيجية العربية الأولى</p>
            
            <a href="{{ url_for('main.register') }}" class="cta-btn">سجل الآن مجاناً</a>
            <div class="link-bio">
                <span class="bio-domain">gangsofpalestine-azad.pythonanywhere.com</span>
                الرابط في البايو 🔗
            </div>
        </div>

        <div class="progress-bar"></div>
    </div>

    <script>
        // Simple auto-reload for looping recording if needed
        // setTimeout(() => { window.location.reload(); }, 20000);
    </script>
</body>
</html>
