<div class="card card-luxury h-100">
    <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center">
                <img src="{{ url_for('static', filename=asset.image_path) }}" alt="{{ asset.symbol }}" class="mr-3 rounded-circle" style="width: 40px; height: 40px; border: 2px solid #2b3139;">
                <div>
                    <h5 class="text-white font-weight-bold mb-0">{{ asset.symbol }}</h5>
                    <span class="text-muted small">{{ asset.name }}</span>
                </div>
            </div>
            <div class="text-right">
                <span class="d-block font-weight-bold {{ 'text-up' if asset.price_change_24h >= 0 else 'text-down' }}" style="font-size: 1.1rem;">
                    {{ "{:+.2f}".format(asset.price_change_24h) }}%
                </span>
                <span class="badge badge-dark border border-secondary" style="font-size: 0.7rem;">{{ asset.asset_type|upper }}</span>
            </div>
        </div>
    
        <div class="d-flex justify-content-between align-items-end mb-3">
            <div>
                <span class="text-muted small d-block">{{ _('السعر الحالي') }}</span>
                <span class="market-price-large {{ 'text-up' if asset.price_change_24h >= 0 else 'text-down' }}">
                    {{ "{:,.2f}".format(asset.current_price) }} <span class="small text-muted">$</span>
                </span>
            </div>
            <!-- Mini Chart Placeholder or Volume -->
            <div class="text-right">
                <span class="text-muted small d-block">{{ _('حجم 24س') }}</span>
                <span class="text-white font-weight-bold">{{ "{:,.0f}".format(asset.volume_24h) }}</span>
            </div>
        </div>
        
        <div class="row no-gutters mt-3">
            <div class="col-12">
                <a href="{{ url_for('market.trade', symbol=asset.symbol) }}" class="btn btn-luxury-gold btn-block font-weight-bold shadow-sm" style="border-radius: 4px;">
                    {{ _('تداول') }} <i class="fas fa-arrow-right ml-1"></i>
                </a>
            </div>
        </div>
    </div>
</div>
