<div class="card luxury-card h-100">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="text-gold font-weight-bold">{{ asset.symbol }}</h5>
            <span class="badge {{ 'badge-success' if asset.price_change_24h >= 0 else 'badge-danger' }}">
                {{ "{:+.2f}".format(asset.price_change_24h) }}%
            </span>
        </div>
        <h6 class="text-muted small mb-3">{{ asset.name }}</h6>
        <h3 class="text-white mb-3">{{ "{:,.2f}".format(asset.current_price) }}$</h3>
        
        <div class="mt-auto">
            <a href="{{ url_for('market.trade', symbol=asset.symbol) }}" class="btn btn-outline-warning btn-block">
                <i class="fas fa-chart-line mr-1"></i> {{ _('تداول / Trade') }}
            </a>
        </div>
    </div>
    <div class="card-footer bg-transparent border-secondary py-2">
        <small class="text-muted">
            <i class="far fa-clock"></i> {{ asset.last_updated.strftime('%H:%M') }}
        </small>
        <span class="float-right badge badge-dark border border-secondary">{{ asset.asset_type|upper }}</span>
    </div>
</div>
