{% extends "base.html" %}

{% block title %}{{ announcement.title }}{% endblock %}

{% block content %}
<div class="container fade-in">
    <div class="row">
        <div class="col-lg-10 offset-lg-1">
            <div class="text-right my-4">
                <a href="{{ url_for('news.index') }}" class="btn btn-outline-light">
                    <i class="fas fa-arrow-right ml-1"></i> {{ _('عودة للأخبار') }}
                </a>
            </div>
            
            <div class="card card-luxury">
                <div class="card-header border-bottom border-gold text-center p-4" style="background: rgba(0,0,0,0.2);">
                    <h1 class="h2 text-gold font-weight-bold mb-2">{{ announcement.title }}</h1>
                    <span class="text-muted small">
                        <i class="far fa-clock mr-1"></i> {{ announcement.created_at.strftime('%Y-%m-%d %H:%M') }}
                    </span>
                </div>
                
                <div class="card-body p-4 text-light" style="font-size: 1.1rem; line-height: 1.8;">
                    {{ announcement.content | safe }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
