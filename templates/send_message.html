{% extends "base.html" %}

{% block content %}
<style>
    .luxury-card {
        background: var(--dark-card);
        border: 1px solid rgba(212, 175, 55, 0.2);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        border-radius: 15px;
        overflow: hidden;
    }

    .luxury-header {
        background: radial-gradient(circle at center, rgba(30, 10, 10, 0.8) 0%, rgba(30, 10, 10, 0.95) 100%);
        border-bottom: 2px solid var(--gold-primary);
        padding: 15px;
    }

    .luxury-title {
        color: var(--gold-primary);
        font-weight: bold;
        margin: 0;
    }

    .form-control-luxury {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        border-radius: 10px;
    }

    .form-control-luxury:focus {
        background: rgba(0, 0, 0, 0.5);
        border-color: var(--gold-primary);
        color: #fff;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .btn-luxury {
        background: linear-gradient(45deg, var(--gold-secondary), var(--gold-primary));
        border: none;
        color: #000;
        font-weight: bold;
        transition: all 0.3s;
        padding: 10px 30px;
        border-radius: 25px;
    }

    .btn-luxury:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        color: #000;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card luxury-card">
            <div class="card-header luxury-header">
                <h3 class="card-title luxury-title">
                    <i class="fas fa-paper-plane mr-2"></i> {{ _('إرسال رسالة') }}
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    
                    <div class="form-group">
                        <label class="text-muted">{{ _('إلى اللاعب:') }}</label>
                        <input type="text" name="receiver" class="form-control form-control-luxury" value="{{ receiver if receiver else '' }}" required placeholder="{{ _('اسم المستخدم') }}">
                    </div>

                    <div class="form-group">
                        <label class="text-muted">{{ _('الموضوع:') }}</label>
                        <input type="text" name="subject" class="form-control form-control-luxury" value="{{ subject if subject else '' }}" required placeholder="{{ _('عنوان الرسالة') }}">
                    </div>

                    <div class="form-group">
                        <label class="text-muted">{{ _('نص الرسالة:') }}</label>
                        <textarea name="body" class="form-control form-control-luxury" rows="6" required placeholder="{{ _('اكتب رسالتك هنا...') }}"></textarea>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-luxury btn-lg">
                            <i class="fas fa-paper-plane mr-2"></i> {{ _('إرسال') }}
                        </button>
                        <a href="{{ url_for('main.messages') }}" class="btn btn-outline-secondary ml-2">
                            {{ _('إلغاء') }}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
