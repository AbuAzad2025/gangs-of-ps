{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU" crossorigin="anonymous">

<div class="container fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card bg-dark text-white border-primary shadow-lg">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h3 class="mb-0"><i class="fas fa-chess mr-2"></i> {{ _('شطرنج الأساتذة') }}</h3>
                    <span class="badge badge-light text-dark">{{ _('ضد الكمبيوتر (Stockfish)') }}</span>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-8">
                            <div id="board" style="width: 100%"></div>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-secondary mb-3">
                                <div class="card-body p-3">
                                    <h5 class="card-title text-warning">{{ _('حالة اللعبة') }}</h5>
                                    <div id="status" class="mb-2 font-weight-bold"></div>
                                    <div class="progress mb-2" style="height: 20px; display:none;" id="ai-thinking">
                                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" role="progressbar" style="width: 100%">{{ _('الكمبيوتر يفكر...') }}</div>
                                    </div>
                                    <hr class="bg-light">
                                    <label class="text-light">{{ _('مستوى الصعوبة') }}</label>
                                    <select id="difficulty" class="form-control mb-3">
                                        <option value="0">{{ _('سهل (قرد)') }}</option>
                                        <option value="5" selected>{{ _('متوسط (هاوٍ)') }}</option>
                                        <option value="10">{{ _('صعب (محترف)') }}</option>
                                        <option value="20">{{ _('مستحيل (جراند ماستر)') }}</option>
                                    </select>
                                    <div class="btn-group-vertical w-100">
                                        <button id="startBtn" class="btn btn-success mb-2"><i class="fas fa-play"></i> {{ _('لعبة جديدة') }}</button>
                                        <button id="undoBtn" class="btn btn-warning mb-2"><i class="fas fa-undo"></i> {{ _('تراجع') }}</button>
                                        <button id="flipBtn" class="btn btn-info"><i class="fas fa-retweet"></i> {{ _('اقلب الرقعة') }}</button>
                                    </div>
                                </div>
                            </div>
                            <div class="card bg-dark border-secondary">
                                <div class="card-body p-2">
                                    <small class="text-muted">{{ _('PGN (سجل الحركات):') }}</small>
                                    <div id="pgn" class="text-monospace text-light small" style="max-height: 150px; overflow-y: auto;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>
    // Initialize Stockfish Web Worker
    const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js');
    
    var board = null
    var game = new Chess()
    var $status = $('#status')
    var $pgn = $('#pgn')
    var $aiThinking = $('#ai-thinking')
    var playerColor = 'w'

    // Configure Stockfish
    stockfish.onmessage = function(event) {
        var line = event.data;
        
        // Best move found
        if (line.startsWith('bestmove')) {
            var bestMove = line.split(' ')[1];
            game.move({ from: bestMove.substring(0, 2), to: bestMove.substring(2, 4), promotion: 'q' });
            board.position(game.fen());
            updateStatus();
            $aiThinking.hide();
        }
    };

    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false
        }
        // Only allow player to move their color
        if (game.turn() !== playerColor) return false;
    }

    function onDrop (source, target) {
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        })

        if (move === null) return 'snapback'

        updateStatus()
        
        // AI Turn
        if (!game.game_over()) {
            $aiThinking.show();
            var difficulty = $('#difficulty').val();
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth ' + difficulty);
        }
    }

    function onSnapEnd () {
        board.position(game.fen())
    }

    function updateStatus () {
        var status = ''
        var moveColor = (game.turn() === 'b') ? 'Black' : 'White'

        if (game.in_checkmate()) {
            status = 'Game over, ' + moveColor + ' is in checkmate.'
        } else if (game.in_draw()) {
            status = 'Game over, drawn position'
        } else {
            status = moveColor + ' to move'
            if (game.in_check()) {
                status += ', ' + moveColor + ' is in check'
            }
        }

        $status.html(status)
        $pgn.html(game.pgn())
    }

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    }
    board = Chessboard('board', config)

    updateStatus()

    $('#startBtn').on('click', function () {
        game.reset()
        board.start()
        updateStatus()
        playerColor = 'w';
        board.orientation('white');
    })

    $('#undoBtn').on('click', function () {
        game.undo()
        game.undo()
        board.position(game.fen())
        updateStatus()
    })

    $('#flipBtn').on('click', function () {
        board.flip();
        playerColor = (playerColor === 'w') ? 'b' : 'w';
        // If it's now AI's turn (because we flipped to black and it's white to move, or vice versa if we wanted to play black)
        // For simplicity, this just flips the view. To play as black, we'd need to trigger AI first move.
        // Let's keep it simple: Flip Board just flips view.
    })
    
    // Initial setup for Stockfish
    stockfish.postMessage('uci');
</script>
{% endblock %}
