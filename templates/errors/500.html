{% extends "base.html" %}

{% block content %}
<div class="error-page-container">
    <div class="error-card danger text-center py-5 px-3">
        <div class="mb-4">
            <i class="fas fa-car-crash error-icon danger"></i>
        </div>
        
        <h1 class="error-title danger">500</h1>
        <div class="error-subtitle danger">{{ _('كمين! صار خلل في النظام') }}</div>
        
        <p class="error-text">
            {{ _('يبدو إنو في حدا خرب العملية. الميكانيكي تبعنا شغال على تصليح الموضوع حالاً. خليك رايق وجرب كمان مرة.') }}
        </p>
        
        <div class="d-flex justify-content-center gap-3">
            <a href="#" onclick="location.reload()" class="btn btn-error-action danger">
                <i class="fas fa-sync-alt mr-2"></i> {{ _('جرب كمان مرة') }}
            </a>
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-light rounded-pill px-4 py-2 ml-2" style="border-color: #555;">
                <i class="fas fa-home mr-2"></i> {{ _('الرئيسية') }}
            </a>
        </div>
        
        <div class="street-overlay-full"></div>
    </div>
</div>
{% endblock %}
